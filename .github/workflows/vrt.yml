name: VRT

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'app/**'
      - 'components/**'
      - 'tests/vrt/**'
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'ベースラインを更新して自動コミットする'
        type: boolean
        default: false

jobs:
  vrt:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_GRAPHQL_ENDPOINT: http://localhost:8080/graphql

      - name: Start app
        run: npm run start &

      - name: Wait for app
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Update snapshots (Linux baseline)
        if: github.event.inputs.update_snapshots == 'true'
        run: npx playwright test --project=vrt --update-snapshots

      - name: Commit updated snapshots
        if: github.event.inputs.update_snapshots == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/vrt/
          git diff --staged --quiet || git commit -m "chore: update VRT baselines (linux)"
          git push

      - name: Run VRT
        if: github.event.inputs.update_snapshots != 'true'
        run: npx playwright test --project=vrt

      - name: Upload diff report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diff-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
